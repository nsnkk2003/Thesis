# deployment.yaml
# Tells Kubernetes: run our training container with GPU access
# FILL IN the placeholders marked with <...> before deploying

apiVersion: batch/v1
kind: Job                    # Job = runs once and stops (not a long-running service)
metadata:
  name: wire-ded-training
  namespace: <YOUR_NAMESPACE>        # Ask Erik for this
spec:
  backoffLimit: 1                    # If it fails, retry once
  template:
    spec:
      restartPolicy: Never           # Don't restart if it finishes or crashes
      containers:
        - name: trainer
          image: <GITLAB_REGISTRY_URL>/wire-ded-llm:latest   # Your GitLab registry URL
          imagePullPolicy: Always

          # Command: run training, then evaluation
          command: ["sh", "-c"]
          args:
            - |
              echo "=== Starting training ==="
              python src/train.py
              echo "=== Training done. Starting evaluation ==="
              python src/evaluate.py
              echo "=== All done ==="

          # GPU and memory resources
          resources:
            requests:
              memory: "32Gi"
              cpu: "4"
              nvidia.com/gpu: "1"          # Request 1 GPU
            limits:
              memory: "64Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          # Environment variables
          env:
            - name: PYTHONUNBUFFERED
              value: "1"                   # Print logs in real-time, no buffering
            # MinIO credentials injected from Kubernetes Secret
            # Create the secret once: kubectl create secret generic minio-creds \
            #   --namespace=<YOUR_NAMESPACE> \
            #   --from-literal=endpoint=minio.dev01.k8s.aeroes.internal \
            #   --from-literal=access-key=YOUR_KEY \
            #   --from-literal=secret-key=YOUR_SECRET
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: endpoint
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-creds
                  key: secret-key

      # If your GitLab registry needs authentication
      imagePullSecrets:
        - name: gitlab-registry-secret    # Ask Erik if this exists or needs to be created
